{% extends 'library/base.html' %}

{% block title %}
Issue Book
{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2>Issue Book</h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
            Issue Book
        </button>

        <a href="{% url 'issue_list' %}" class="btn btn-secondary">
            View Issued Books
        </a>

    </form>

</div>

{% endblock %}
